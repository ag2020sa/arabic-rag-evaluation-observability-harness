apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-api
  namespace: arabic-rag-eval
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harness-api
  template:
    metadata:
      labels:
        app: harness-api
    spec:
      containers:
        - name: harness-api
          image: arabic-rag-eval-harness:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: harness-api
  namespace: arabic-rag-eval
spec:
  selector:
    app: harness-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
