services:
  harness-api:
    build: .
    container_name: arabic-rag-eval-harness-api
    ports:
      - "${HARNESS_API_PORT:-8080}:8080"
    env_file:
      - .env.example
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      - qdrant
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-eval-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./.qdrant:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: rag-eval-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_eval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_eval}
      POSTGRES_DB: ${POSTGRES_DB:-rag_eval}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: rag-eval-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:latest
    container_name: rag-eval-prometheus
    ports:
      - "${PROMETHEUS_HTTP_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
