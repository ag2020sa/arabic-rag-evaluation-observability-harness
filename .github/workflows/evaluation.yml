name: Arabic RAG Evaluation Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  evaluate:
    name: Test, Evaluate, and Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run unit tests
        run: pytest -q

      - name: Run lint
        run: make lint

      - name: Run Arabic RAG evaluation
        run: make evaluate

      - name: Generate release report
        run: make report

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Smoke check API and dashboard assets
        run: |
          python - <<'PY'
          from pathlib import Path

          from fastapi.testclient import TestClient

          from rag_eval_harness.api.main import app

          response = TestClient(app).get("/health")
          print(response.status_code, response.json())
          if response.status_code != 200:
              raise SystemExit("API health check failed.")
          if not Path("dashboard/streamlit_app.py").exists():
              raise SystemExit("Dashboard entrypoint is missing.")
          PY

      - name: Enforce release gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/latest_evaluation_report.json").read_text(encoding="utf-8"))
          decision = report.get("decision")
          passed = report.get("passed")
          print(f"Release decision: {decision}")
          print(f"Passed: {passed}")
          if decision not in {"PROMOTE_TO_STAGING", "HUMAN_REVIEW_REQUIRED", "BLOCK_RELEASE"}:
              raise SystemExit(f"Unknown release decision: {decision}")
          if decision == "PROMOTE_TO_STAGING" and passed is not True:
              raise SystemExit("Inconsistent gate state: promote decision without passed=true.")
          if decision == "BLOCK_RELEASE":
              raise SystemExit("Arabic RAG release gate failed.")
          if decision == "HUMAN_REVIEW_REQUIRED":
              print("Human review required before release approval.")
          PY

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: arabic-rag-evaluation-report
          path: |
            reports/latest_evaluation_report.json
            reports/latest_release_report.md
